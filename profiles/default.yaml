name: "default"
description: "Fallback profile — basic arrow navigation"

match: []

config:
  deadzone: 0.25
  repeat_delay_ms: 400
  repeat_rate_ms: 130
  long_press_ms: 600
  stick_as_dpad: true
  stick_threshold: 0.6

bindings:
  DPAD_UP:      { key: "KEY_UP" }
  DPAD_DOWN:    { key: "KEY_DOWN" }
  DPAD_LEFT:    { key: "KEY_LEFT" }
  DPAD_RIGHT:   { key: "KEY_RIGHT" }
  BUTTON_A:     { key: "KEY_RETURN" }
  BUTTON_B:     { key: "KEY_ESCAPE" }
  BUTTON_START: { key: "KEY_SPACE" }
  BUTTON_SELECT:
    short_press: { key: "KEY_TAB" }
