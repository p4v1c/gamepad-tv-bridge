name: "Stremio"
description: "Stremio media center (fork stremio-web + clavier virtuel TV) — la navigation est gérée NATIVEMENT par l'app via la Gamepad API du navigateur (dpad/stick, A, B, X, Y, L1/R1) ; le bridge ne traduit plus que ce que l'app ne couvre pas."

match:
  - title_contains: "Stremio"

config:
  deadzone: 0.20
  repeat_delay_ms: 500
  repeat_rate_ms: 150
  long_press_ms: 600
  stick_as_dpad: false
  stick_threshold: 0.50

bindings:
  BUTTON_START: { key: "KEY_SPACE" }
  BUTTON_LT:    { key: "KEY_VOLUMEDOWN" }
  BUTTON_RT:    { key: "KEY_VOLUMEUP" }
  BUTTON_SELECT:
    short_press: { key: "KEY_F" }
    long_press:  { combo: ["KEY_LEFTCTRL", "KEY_W"] }
