name: "Twitch"
description: "twitch.tv — stream navigation and theatre mode"

match:
  - title_contains: "Twitch"

config:
  deadzone: 0.25
  repeat_delay_ms: 400
  repeat_rate_ms: 130
  long_press_ms: 600
  stick_as_dpad: true
  stick_threshold: 0.6

bindings:
  DPAD_UP:      { key: "KEY_UP" }
  DPAD_DOWN:    { key: "KEY_DOWN" }
  DPAD_LEFT:    { key: "KEY_LEFT" }
  DPAD_RIGHT:   { key: "KEY_RIGHT" }
  BUTTON_A:     { key: "KEY_RETURN" }
  BUTTON_B:     { key: "KEY_ESCAPE" }
  BUTTON_Y:     { key: "KEY_T" }       # theatre mode
  BUTTON_X:     { key: "KEY_M" }       # mute
  BUTTON_START: { key: "KEY_SPACE" }   # play/pause
  BUTTON_LB:    { key: "KEY_LEFT" }
  BUTTON_RB:    { key: "KEY_RIGHT" }
  BUTTON_LT:    { key: "KEY_MINUS" }   # volume down
  BUTTON_RT:    { key: "KEY_EQUAL" }   # volume up
  BUTTON_SELECT:
    short_press: { key: "KEY_F" }       # fullscreen
    long_press:  { combo: ["KEY_LEFTCTRL", "KEY_W"] }
